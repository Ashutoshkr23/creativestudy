<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Understanding Quadrilaterals — learn.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/global.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  /* ===== HEADER ===== */
  .chapter-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,7,15,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .chapter-header .row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; }
  .chapter-header .back {
    width: 34px; height: 34px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px; background: var(--surface); border: 1px solid var(--border);
  }
  .chapter-header h1 { font-size: 1rem; flex: 1; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.06); }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s ease; }

  /* ===== SCENES ===== */
  .topic-view { display: none; position: fixed; top: var(--header-h, 60px); left: 0; right: 0; bottom: 0; }
  .topic-view.active { display: block; }
  .scene-container { height: 100%; position: relative; overflow: hidden; outline: none; }
  .scene {
    height: 100%; width: 100%; position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px 40px; text-align: center;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    overflow-y: auto; overflow-x: hidden;
  }
  .scene::before, .scene::after { content: ''; flex: 0 0 auto; margin: auto; }
  .scene .eyebrow { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent, var(--primary)); margin-bottom: 10px; font-weight: 600; }
  .scene h2 { font-size: clamp(1.35rem, 5vw, 2rem); margin-bottom: 10px; max-width: 640px; }
  .scene .explain { color: var(--text-secondary); max-width: 500px; font-size: 0.92rem; margin-bottom: 20px; }
  .scroll-hint { position: absolute; bottom: 14px; left: 0; right: 0; font-size: 0.72rem; color: var(--text-muted); animation: hintBob 1.8s ease-in-out infinite; }
  @keyframes hintBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

  .flip-card { perspective: 800px; }
  .flip-inner { width: 100%; height: 100%; position: relative; transition: transform .6s; transform-style: preserve-3d; }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
  }
  .flip-back { transform: rotateY(180deg); padding: 6px; text-align: center; color: var(--text-secondary); }

  .game-btn {
    padding: 11px 20px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 600; font-size: 0.88rem;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .game-btn:hover { border-color: var(--accent, var(--primary)); transform: translateY(-2px); }
  .game-btn.primary { background: var(--accent, var(--primary)); border-color: transparent; color: #fff; }
  .game-btn:disabled { opacity: 0.35; pointer-events: none; }
  .wrong-shake { animation: itemShake .3s ease; }
  @keyframes itemShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .msg-line { min-height: 22px; font-size: 0.85rem; color: var(--text-secondary); margin-top: 12px; }
  .msg-line.good { color: var(--teal); font-weight: 600; }
  .msg-line.bad { color: var(--coral); font-weight: 600; }

  .toy-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .toy-panel svg { display: block; max-width: 100%; height: auto; touch-action: none; }

  /* ===== 1. SHAPE HUNT ===== */
  .hunt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 480px; }
  .hunt-item {
    aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: opacity .3s ease, transform .3s ease;
  }
  .hunt-item svg { width: 70%; height: 70%; }
  .hunt-item.placed { opacity: 0; transform: scale(0.4); pointer-events: none; }
  .hunt-basket {
    margin: 0 auto 16px; display: flex; align-items: center; gap: 12px; padding: 12px 22px;
    border: 2px dashed rgba(255,255,255,0.2); border-radius: 14px; width: fit-content; transition: border-color .3s ease;
  }
  .hunt-basket.full { border-color: var(--accent); }
  .hunt-basket .cnt { font-family: var(--font-head); font-weight: 700; }
  .hunt-reveal { display: none; margin-top: 14px; font-size: 0.85rem; color: var(--teal); font-weight: 600; }
  .hunt-reveal.show { display: block; animation: popIn .5s ease; }

  /* ===== 2. DENT DETECTOR ===== */
  .dent-stage { width: 230px; height: 190px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .dent-stage svg { width: 80%; height: 80%; }
  .dent-btns { display: flex; gap: 10px; }
  .dent-progress { display: flex; gap: 7px; justify-content: center; margin-bottom: 14px; }
  .dent-progress span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.12); }
  .dent-progress span.on { background: var(--accent, var(--primary)); }
  .dent-done { display: none; }
  .dent-done.show { display: block; animation: popIn .5s ease; }

  /* ===== concept cards ===== */
  .concept-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .concept-cards .flip-card { width: 150px; height: 140px; cursor: pointer; }
  .concept-cards .flip-front { font-size: 0.85rem; font-weight: 600; gap: 6px; padding: 8px; }
  .concept-cards .flip-front svg { width: 54px; height: 54px; }
  .concept-cards .flip-back { font-size: 0.7rem; line-height: 1.45; padding: 10px; }
  .concept-cards .flip-back b { color: var(--accent, var(--primary)); }

  /* ===== 4. ANGLE TOY ===== */
  .angle-sum-display { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; margin-top: 12px; }
  .angle-sum-display .total { color: var(--accent, var(--primary)); font-size: 1.3rem; }
  .drag-tip { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }

  /* ===== 5. MISSING ANGLE ===== */
  .missing-eq { font-family: var(--font-head); font-size: 1.6rem; font-weight: 700; margin-bottom: 18px; }
  .missing-eq .q-mark { color: var(--accent, var(--primary)); }
  .chip-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  .num-chip {
    min-width: 64px; padding: 13px 10px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-head); font-size: 1rem; font-weight: 700;
    transition: transform .15s ease, background .2s ease, border-color .2s ease;
  }
  .num-chip:hover { transform: translateY(-3px); }
  .num-chip.winner { background: var(--teal); border-color: transparent; color: #fff; box-shadow: 0 0 18px rgba(29,184,138,0.5); }

  /* ===== 6. EXTERIOR WALK ===== */
  .walk-total { font-family: var(--font-head); font-size: 1.15rem; font-weight: 700; margin-top: 12px; min-height: 28px; }
  .walk-total .sum { color: var(--accent, var(--primary)); }

  /* ===== 7. FAMILY TREE ===== */
  .tree-wrap { width: 100%; max-width: 480px; }
  .tree-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
  .tree-node {
    padding: 10px 14px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 600; font-size: 0.8rem;
    transition: border-color .2s ease, background .2s ease;
  }
  .tree-node.sel { background: var(--accent, var(--teal)); border-color: transparent; color: #fff; }
  .tree-connector { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 10px; }
  .tree-info {
    margin-top: 8px; padding: 16px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; text-align: left; min-height: 110px;
  }
  .tree-info svg { width: 84px; height: 84px; flex-shrink: 0; }
  .tree-info .props { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.55; }
  .tree-info .props b { color: var(--text); display: block; margin-bottom: 4px; font-family: var(--font-head); }

  /* ===== 8. GUESS WHO ===== */
  .riddle-card {
    width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; margin-bottom: 16px;
    font-size: 1rem; line-height: 1.6; font-family: var(--font-head); min-height: 96px;
    display: flex; align-items: center; justify-content: center;
  }
  .riddle-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; width: 100%; max-width: 420px; }
  .riddle-progress { display: flex; gap: 7px; justify-content: center; margin-bottom: 14px; }
  .riddle-progress span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.12); }
  .riddle-progress span.on { background: var(--accent, var(--teal)); }

  /* ===== 9. PARA LAB readouts ===== */
  .lab-readout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 380px; margin-top: 12px; }
  .lab-readout .cell {
    padding: 9px 8px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text-secondary);
  }
  .lab-readout .cell b { font-family: var(--font-head); color: var(--accent, var(--amber)); font-size: 0.9rem; display: block; }

  /* ===== 10. DIAGONALS ===== */
  .diag-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
  .diag-btns .game-btn { font-size: 0.78rem; padding: 9px 13px; }
  .diag-btns .game-btn.sel { background: var(--accent, var(--amber)); border-color: transparent; color: #fff; }
  .diag-fact { min-height: 44px; font-size: 0.85rem; color: var(--text-secondary); max-width: 380px; margin-top: 10px; }
  .diag-fact b { color: var(--accent, var(--amber)); }
  @keyframes midPulse { 0%,100% { r: 5; } 50% { r: 9; } }
  .mid-dot { animation: midPulse 1.6s ease-in-out infinite; }

  /* ===== quiz ===== */
  .quiz-box { width: 100%; max-width: 440px; }
  .quiz-hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-family: var(--font-head); font-size: 0.85rem; }
  .quiz-hud .streak { color: var(--amber); }
  .quiz-q { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; min-height: 58px; margin-bottom: 14px; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .quiz-opts .game-btn { font-size: 0.9rem; }
  .quiz-opts .game-btn.correct { background: var(--teal); border-color: transparent; color: #fff; }
  .quiz-opts .game-btn.incorrect { background: var(--coral); border-color: transparent; color: #fff; }
  .quiz-start-panel, .quiz-result-panel { text-align: center; }
  .quiz-result-panel { display: none; }
  .quiz-result-panel .final-score { font-family: var(--font-head); font-size: 3rem; color: var(--accent, var(--pink)); }
  .quiz-result-panel .best { font-size: 0.85rem; color: var(--text-secondary); margin: 8px 0 18px; }
  .confetti-bit { position: fixed; top: -12px; width: 8px; height: 14px; z-index: 200; animation: confettiFall linear forwards; pointer-events: none; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0.6; } }

  /* ===== finish ===== */
  .recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 460px; margin-bottom: 22px; }
  .recap-card { padding: 16px 12px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); text-align: left; }
  .recap-card .ic { font-size: 1.4rem; margin-bottom: 8px; }
  .recap-card h4 { font-size: 0.82rem; margin-bottom: 5px; }
  .recap-card p { font-size: 0.68rem; color: var(--text-secondary); line-height: 1.45; }

  @media (max-width: 480px) {
    .hunt-grid { grid-template-columns: repeat(2, 1fr); max-width: 300px; }
    .tree-info { flex-direction: column; text-align: center; }
  }
</style>
</head>

<script>
const CHAPTER_ID = 'quadrilaterals';

/* small helper to draw a polygon svg */
function shapeSvg(points, opts = {}) {
  const stroke = opts.stroke || 'currentColor';
  const fill = opts.fill || 'rgba(108,99,255,0.18)';
  const closed = opts.open ? 'polyline' : 'polygon';
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <${closed} points="${points}" fill="${opts.open ? 'none' : fill}" stroke="${stroke}" stroke-width="4" stroke-linejoin="round"/>
  </svg>`;
}

/* ============== TOPIC DATA ============== */
const TOPICS = [
  {
    id: 'polygon-safari', title: 'Polygon Safari', color: '#D85A30',
    scenes: [
      `<div class="eyebrow">🔍 Shape Hunt</div>
       <h2>Catch the quadrilaterals!</h2>
       <p class="explain">A <b style="color:var(--text)">quadrilateral</b> = a closed shape with exactly <b style="color:var(--text)">4 straight sides</b>. Tap only the true quadrilaterals — decoys are hiding!</p>
       <div class="hunt-basket" id="hunt-basket"><span>🪤</span><span class="cnt" id="hunt-count">0 / 4</span><span style="font-size:0.72rem;color:var(--text-secondary)">caught</span></div>
       <div class="hunt-grid" id="hunt-grid"></div>

       <div class="scroll-hint">▼ scroll to continue</div>`,
      `<div class="eyebrow">🕵️ Dent Detector</div>
       <h2>Convex or concave?</h2>
       <p class="explain"><b style="color:var(--text)">Convex</b> = no dents, every corner points outwards. <b style="color:var(--text)">Concave</b> = at least one corner caves IN (a dent!). Judge each suspect:</p>
       <div class="dent-progress" id="dent-progress"></div>
       <div class="dent-stage" id="dent-stage"></div>
       <div class="dent-btns" id="dent-btns">
         <button class="game-btn" data-v="convex">😊 Convex</button>
         <button class="game-btn" data-v="concave">😬 Concave (dent!)</button>
       </div>
       <div class="msg-line" id="dent-msg"></div>
       <div class="dent-done" id="dent-done">
         <p style="color:var(--teal); font-weight:600;">🏅 Dent Detective badge earned!</p>
         <p style="font-size:0.8rem; color:var(--text-secondary); margin-top:6px;">Trick: stretch a rubber band around the shape. If it touches every corner — convex!</p>
       </div>`,
      `<div class="eyebrow">📖 Concept</div>
       <h2>Regular or irregular?</h2>
       <p class="explain">Tap each card. A <b style="color:var(--text)">regular polygon</b> has ALL sides equal AND all angles equal — both conditions, no cheating!</p>

       <div class="dent-progress" id="missing-progress"></div>
       <div class="missing-eq" id="missing-eq"></div>
       <div class="chip-row" id="missing-chips"></div>
       <div class="msg-line" id="missing-msg"></div>`,
      `<div class="eyebrow">🚶 Field Trip</div>

       <div class="toy-panel">

      `<div class="eyebrow">🎭 Guess Who?</div>

  },
  {

    scenes: [

       </div>
       <div class="diag-fact" id="diag-fact"></div>`,
      `<div class="eyebrow">🎯 Practice</div>
       <h2>Crack the parallelogram codes</h2>

       <div class="dent-progress" id="code-progress"></div>
       <div class="missing-eq" id="code-q" style="font-size:1.15rem; max-width:420px;"></div>
       <div class="chip-row" id="code-chips"></div>

  },
  {
    id: 'boss', title: 'Boss Level', color: '#D4537E',
    scenes: [
      `<div class="eyebrow">👑 Boss Level</div>
       <h2>The Shape Shifter</h2>
       <div class="quiz-box">
         <div class="quiz-start-panel" id="quiz-start-panel">
           <p class="explain" style="margin:0 auto 18px;">8 questions · no time pressure · streaks earn bonus points. Ready?</p>
           <button class="game-btn primary" id="quiz-start">⚔️ Face the Shape Shifter</button>

         <div id="quiz-play-panel" style="display:none;">
           <div class="quiz-hud">
             <span id="quiz-progress">Q 1/8</span>

/* ============== geometry helpers ============== */
function interiorAngles(pts) {
  // works for any simple polygon, concave corners included (uses signed turns)
  const n = pts.length;
  const turns = [];
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i - 1 + n) % n], p1 = pts[i], p2 = pts[(i + 1) % n];
    const v1 = { x: p1.x - p0.x, y: p1.y - p0.y };
    const v2 = { x: p2.x - p1.x, y: p2.y - p1.y };
    const cross = v1.x * v2.y - v1.y * v2.x;
    const dot = v1.x * v2.x + v1.y * v2.y;
    turns.push(Math.atan2(cross, dot) * 180 / Math.PI);
  }
  const sign = turns.reduce((a, b) => a + b, 0) > 0 ? 1 : -1;
  return turns.map(t => 180 - sign * t);
}

/* ============== 4. QUAD ANGLE TOY ============== */
(() => {
  const svg = document.getElementById('quad-toy');
  shieldFromSwipe(svg);
  const NS = 'http://www.w3.org/2000/svg';
  // one vertex per quadrant keeps the polygon simple
  const pts = [
    { x: 70, y: 195, min: [25, 135], max: [155, 235] },   // bottom-left
    { x: 275, y: 200, min: [185, 135], max: [315, 235] }, // bottom-right
    { x: 255, y: 55, min: [185, 15], max: [315, 115] },   // top-right
    { x: 85, y: 50, min: [25, 15], max: [155, 115] }      // top-left
  ];
  const COLORS = ['#D85A30', '#1DB88A', '#EF9F27', '#D4537E'];

  const poly = document.createElementNS(NS, 'polygon');
  poly.setAttribute('fill', 'rgba(108,99,255,0.16)');
  poly.setAttribute('stroke', '#8a84ff');
  poly.setAttribute('stroke-width', '3');
  poly.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(poly);

  const labels = [], handles = [];
  pts.forEach((p, i) => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('fill', COLORS[i]);
    t.setAttribute('font-size', '15');
    t.setAttribute('font-weight', '700');
    t.setAttribute('font-family', 'Space Grotesk, sans-serif');
    t.setAttribute('text-anchor', 'middle');
    svg.appendChild(t);
    labels.push(t);

    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('r', '11');
    c.setAttribute('fill', COLORS[i]);
    c.setAttribute('stroke', '#fff');
    c.setAttribute('stroke-width', '2');
    c.style.cursor = 'grab';
    c.style.filter = 'drop-shadow(0 0 6px ' + COLORS[i] + ')';
    svg.appendChild(c);
    handles.push(c);
  });

  const sumEl = document.getElementById('quad-sum');

  function render() {
    poly.setAttribute('points', pts.map(p => `${p.x},${p.y}`).join(' '));
    const angles = interiorAngles(pts);
    const cx = pts.reduce((a, p) => a + p.x, 0) / 4;
    const cy = pts.reduce((a, p) => a + p.y, 0) / 4;
    pts.forEach((p, i) => {
      handles[i].setAttribute('cx', p.x);
      handles[i].setAttribute('cy', p.y);
      // place the label a bit towards the centre
      const lx = p.x + (cx - p.x) * 0.32, ly = p.y + (cy - p.y) * 0.32;
      labels[i].setAttribute('x', lx);
      labels[i].setAttribute('y', ly + 5);
      labels[i].textContent = Math.round(angles[i]) + '°';
    });
    const rounded = angles.map(a => Math.round(a));
    // make displayed values add to exactly 360 (rounding can drift by 1)
    const drift = 360 - rounded.reduce((a, b) => a + b, 0);
    rounded[0] += drift;
    labels.forEach((l, i) => l.textContent = rounded[i] + '°');
    sumEl.innerHTML = rounded.map((a, i) => `<span style="color:${COLORS[i]}">${a}°</span>`).join(' + ') +
      ' = <span class="total">360° — always!</span>';
  }

  let dragging = -1;
  function svgPoint(e) {
    const r = svg.getBoundingClientRect();
    if (!r.width || !r.height) return null;
    const scaleX = 340 / r.width, scaleY = 250 / r.height;
    return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY };
  }
  handles.forEach((h, i) => {
    h.addEventListener('pointerdown', (e) => {
      dragging = i;
      try { h.setPointerCapture(e.pointerId); } catch (err) { /* synthetic pointer */ }
      e.preventDefault();
    });
    h.addEventListener('pointermove', (e) => {
      if (dragging !== i) return;
      const p = svgPoint(e);
      if (!p) return;
      pts[i].x = Math.max(pts[i].min[0], Math.min(pts[i].max[0], p.x));
      pts[i].y = Math.max(pts[i].min[1], Math.min(pts[i].max[1], p.y));
      render();
    });
    h.addEventListener('pointerup', () => { dragging = -1; });
  });
  render();
})();

(() => {

    card.textContent = RIDDLES[ri].q;
    opts.innerHTML = '';
    RIDDLES[ri].opts.forEach(o => {
      const b = document.createElement('button');
      b.className = 'game-btn';
      b.textContent = o;
      opts.appendChild(b);
    });
    Array.from(progress.children).forEach((d, k) => d.classList.toggle('on', k <= ri));
  }
  opts.addEventListener('click', (e) => {
    const b = e.target.closest('.game-btn');
    if (!b) return;
    if (b.textContent === RIDDLES[ri].a) {
      playBeep(640); setTimeout(() => playBeep(860), 120);
      msg.textContent = `✓ It was the ${RIDDLES[ri].a}!`;
      msg.className = 'msg-line good';
      ri++;
      if (ri < RIDDLES.length) setTimeout(show, 900);
      else setTimeout(() => {
        card.textContent = '🎭 All five unmasked — you know the whole family!';
        opts.innerHTML = '';
      }, 900);
    } else {
      b.classList.add('wrong-shake');
      playBeep(190, 0.18, 'square');
      setTimeout(() => b.classList.remove('wrong-shake'), 300);
      msg.textContent = 'Re-read the clue — every word matters!';
      msg.className = 'msg-line bad';
    }
  });
  show();
})();

/* ============== 9. PARALLELOGRAM SHEAR TOY ============== */
(() => {
  const svg = document.getElementById('para-toy');
  shieldFromSwipe(svg);
  const NS = 'http://www.w3.org/2000/svg';
  const A = { x: 60, y: 190 }, B = { x: 230, y: 190 };
  let shift = 55; // horizontal offset of the top edge
  const H = 120;

  const poly = document.createElementNS(NS, 'polygon');
  poly.setAttribute('fill', 'rgba(239,159,39,0.16)');
  poly.setAttribute('stroke', '#EF9F27');
  poly.setAttribute('stroke-width', '3');
  poly.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(poly);

  const diag1 = document.createElementNS(NS, 'line');
  const diag2 = document.createElementNS(NS, 'line');
  [diag1, diag2].forEach(d => {
    d.setAttribute('stroke', 'rgba(255,255,255,0.25)');
    d.setAttribute('stroke-width', '2');
    d.setAttribute('stroke-dasharray', '5 4');
    svg.appendChild(d);
  });
  const mid = document.createElementNS(NS, 'circle');
  mid.setAttribute('class', 'mid-dot');
  mid.setAttribute('r', '6');
  mid.setAttribute('fill', '#fff');
  svg.appendChild(mid);

  const handle = document.createElementNS(NS, 'circle');
  handle.setAttribute('r', '11');
  handle.setAttribute('fill', '#EF9F27');
  handle.setAttribute('stroke', '#fff');
  handle.setAttribute('stroke-width', '2');
  handle.style.cursor = 'grab';
  handle.style.filter = 'drop-shadow(0 0 6px #EF9F27)';
  svg.appendChild(handle);

  const labels = {};
  ['A', 'B', 'C', 'D'].forEach(k => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('fill', 'rgba(255,255,255,0.7)');
    t.setAttribute('font-size', '13');
    t.setAttribute('font-weight', '700');
    t.setAttribute('font-family', 'Space Grotesk, sans-serif');
    t.textContent = k;
    svg.appendChild(t);
    labels[k] = t;
  });

  const readout = document.getElementById('para-readout');

  function render() {
    const D = { x: A.x + shift, y: A.y - H };
    const C = { x: B.x + shift, y: B.y - H };
    poly.setAttribute('points', `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}`);
    diag1.setAttribute('x1', A.x); diag1.setAttribute('y1', A.y);
    diag1.setAttribute('x2', C.x); diag1.setAttribute('y2', C.y);
    diag2.setAttribute('x1', B.x); diag2.setAttribute('y1', B.y);
    diag2.setAttribute('x2', D.x); diag2.setAttribute('y2', D.y);
    mid.setAttribute('cx', (A.x + C.x) / 2);
    mid.setAttribute('cy', (A.y + C.y) / 2);
    handle.setAttribute('cx', D.x); handle.setAttribute('cy', D.y);
    labels.A.setAttribute('x', A.x - 16); labels.A.setAttribute('y', A.y + 14);
    labels.B.setAttribute('x', B.x + 6); labels.B.setAttribute('y', B.y + 14);
    labels.C.setAttribute('x', C.x + 8); labels.C.setAttribute('y', C.y - 4);
    labels.D.setAttribute('x', D.x - 18); labels.D.setAttribute('y', D.y - 4);

    const base = B.x - A.x;
    const side = Math.round(Math.sqrt(shift * shift + H * H));
    const angleA = Math.round(Math.atan2(H, shift) * 180 / Math.PI);
    const angleB = 180 - angleA;
    readout.innerHTML = `
      <div class="cell">AB = DC <b>${base} px each — always equal</b></div>
      <div class="cell">AD = BC <b>${side} px each — always equal</b></div>
      <div class="cell">∠A = ∠C <b>${angleA}° and ${angleA}°</b></div>
      <div class="cell">∠A + ∠B <b>${angleA}° + ${angleB}° = 180°</b></div>`;
  }

  let dragging = false;
  handle.addEventListener('pointerdown', (e) => { dragging = true; try { handle.setPointerCapture(e.pointerId); } catch (err) {} e.preventDefault(); });
  handle.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const r = svg.getBoundingClientRect();
    if (!r.width) return;
    const x = (e.clientX - r.left) * (340 / r.width);
    shift = Math.max(-45, Math.min(105, x - A.x));
    render();
  });
  handle.addEventListener('pointerup', () => { dragging = false; });
  render();
})();

/* ============== 10. DIAGONAL DETECTIVE ============== */
(() => {
  const svg = document.getElementById('diag-svg');
  const NS = 'http://www.w3.org/2000/svg';
  const SHAPES = {
    para: { pts: [[50, 170], [220, 170], [270, 45], [100, 45]], fact: 'Diagonals <b>bisect each other</b> — each cuts the other exactly in half. (Different lengths, not perpendicular.)' },
    rect: { pts: [[45, 165], [275, 165], [275, 45], [45, 45]], fact: 'Diagonals bisect each other <b>AND are equal in length</b>. That\'s how carpenters check a frame is truly rectangular!' },
    rhombus: { pts: [[160, 195], [255, 105], [160, 15], [65, 105]], fact: 'Diagonals bisect each other <b>AND cross at 90°</b> — they are perpendicular bisectors.' },
    square: { pts: [[90, 175], [230, 175], [230, 35], [90, 35]], fact: 'The full package: diagonals <b>equal, perpendicular AND bisecting</b>. Royalty inherits everything 👑' }
  };
  const factEl = document.getElementById('diag-fact');

  function draw(key) {
    svg.innerHTML = '';
    const s = SHAPES[key];
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', s.pts.map(p => p.join(',')).join(' '));
    poly.setAttribute('fill', 'rgba(239,159,39,0.14)');
    poly.setAttribute('stroke', '#EF9F27');
    poly.setAttribute('stroke-width', '3');
    svg.appendChild(poly);
    const [p0, p1, p2, p3] = s.pts;
    [[p0, p2], [p1, p3]].forEach(([a, b], i) => {
      const l = document.createElementNS(NS, 'line');
      l.setAttribute('x1', a[0]); l.setAttribute('y1', a[1]);
      l.setAttribute('x2', b[0]); l.setAttribute('y2', b[1]);
      l.setAttribute('stroke', i ? '#D4537E' : '#1DB88A');
      l.setAttribute('stroke-width', '3');
      l.setAttribute('stroke-dasharray', '260');
      l.setAttribute('stroke-dashoffset', '260');
      l.style.transition = 'stroke-dashoffset 1s ease ' + (i * 0.35) + 's';
      svg.appendChild(l);
      requestAnimationFrame(() => requestAnimationFrame(() => l.setAttribute('stroke-dashoffset', '0')));
    });
    const mid = document.createElementNS(NS, 'circle');
    mid.setAttribute('class', 'mid-dot');
    mid.setAttribute('cx', (p0[0] + p2[0]) / 2);
    mid.setAttribute('cy', (p0[1] + p2[1]) / 2);
    mid.setAttribute('r', '5');
    mid.setAttribute('fill', '#fff');
    svg.appendChild(mid);
    factEl.innerHTML = s.fact;
  }

  document.getElementById('diag-btns').addEventListener('click', (e) => {
    const b = e.target.closest('[data-d]');
    if (!b) return;
    document.querySelectorAll('#diag-btns .game-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    draw(b.dataset.d);
    playBeep(520);
  });
  draw('para');
})();

/* ============== 11. PARALLELOGRAM CODES ============== */
(() => {
  const PUZZLES = [
    { q: 'In parallelogram ABCD, ∠A = 70°. What is ∠B?', ans: '110°', opts: ['70°', '90°', '110°', '140°'], why: 'Adjacent angles add to 180°: 180 − 70 = 110.' },
    { q: 'In parallelogram ABCD, ∠A = 70°. What is ∠C (opposite to A)?', ans: '70°', opts: ['110°', '70°', '90°', '20°'], why: 'Opposite angles are equal!' },
    { q: 'In parallelogram PQRS, side PQ = 2x and its opposite side SR = 12 cm. Find x.', ans: 'x = 6', opts: ['x = 3', 'x = 6', 'x = 12', 'x = 24'], why: 'Opposite sides equal: 2x = 12 → x = 6.' }
  ];
  let pi = 0;
  const qEl = document.getElementById('code-q');
  const chips = document.getElementById('code-chips');
  const msg = document.getElementById('code-msg');
  const progress = document.getElementById('code-progress');
  PUZZLES.forEach(() => progress.appendChild(document.createElement('span')));

  function show() {
    qEl.textContent = PUZZLES[pi].q;
    chips.innerHTML = '';
    PUZZLES[pi].opts.forEach(o => {
      const b = document.createElement('button');
      b.className = 'num-chip';
      b.textContent = o;
      chips.appendChild(b);
    });
    Array.from(progress.children).forEach((d, k) => d.classList.toggle('on', k <= pi));
  }
  chips.addEventListener('click', (e) => {
    const b = e.target.closest('.num-chip');
    if (!b) return;
    if (b.textContent === PUZZLES[pi].ans) {
      b.classList.add('winner');
      playBeep(660); setTimeout(() => playBeep(880), 130);
      msg.textContent = '✓ ' + PUZZLES[pi].why;
      msg.className = 'msg-line good';
      pi++;
      if (pi < PUZZLES.length) setTimeout(show, 1300);
      else setTimeout(() => {
        qEl.textContent = '🏆 All codes cracked!';
        chips.innerHTML = '';
        msg.textContent = '';
      }, 1300);
    } else {
      b.classList.add('wrong-shake');
      playBeep(190, 0.18, 'square');
      setTimeout(() => b.classList.remove('wrong-shake'), 300);
      msg.textContent = 'Which lab rule applies here? Check the recap above.';
      msg.className = 'msg-line bad';
    }
  });
  show();
})();

/* ============== 12. BOSS QUIZ (no timer — take your time!) ============== */
(() => {
  const QUESTIONS = [
    { q: 'The interior angles of ANY quadrilateral add up to:', opts: ['180°', '270°', '360°', '540°'], correct: 2 },
    { q: 'Three angles are 80°, 90° and 100°. The fourth is:', opts: ['80°', '90°', '100°', '110°'], correct: 1 },
    { q: 'The exterior angles of any polygon always add up to:', opts: ['180°', '360°', '540°', 'depends on sides'], correct: 1 },
    { q: 'A parallelogram with all sides equal but NO right angles is a:', opts: ['Square', 'Rectangle', 'Rhombus', 'Kite'], correct: 2 },
    { q: 'In a parallelogram, opposite angles are always:', opts: ['supplementary', 'equal', '90°', 'unequal'], correct: 1 },
    { q: 'Whose diagonals are equal AND cross at right angles?', opts: ['Rectangle', 'Rhombus', 'Parallelogram', 'Square'], correct: 3 },
    { q: 'A quadrilateral with exactly ONE pair of parallel sides:', opts: ['Trapezium', 'Kite', 'Rhombus', 'Parallelogram'], correct: 0 },
    { q: 'In parallelogram ABCD, ∠A = 65°. Then ∠B = ?', opts: ['65°', '105°', '115°', '125°'], correct: 2 }
  ];
  let qi = 0, score = 0, streak = 0, answered = false;

  const startPanel = document.getElementById('quiz-start-panel');
  const playPanel = document.getElementById('quiz-play-panel');
  const resultPanel = document.getElementById('quiz-result-panel');
  const qEl = document.getElementById('quiz-q');
  const optsEl = document.getElementById('quiz-opts');

  function hud() {
    document.getElementById('quiz-progress').textContent = `Q ${Math.min(qi + 1, QUESTIONS.length)}/${QUESTIONS.length}`;
    document.getElementById('quiz-streak').textContent = `🔥 streak ${streak}`;
    document.getElementById('quiz-score').textContent = `${score} pts`;
  }

  function renderQ() {
    answered = false;
    const item = QUESTIONS[qi];
    qEl.textContent = item.q;
    optsEl.innerHTML = '';
    item.opts.forEach((label, i) => {
      const b = document.createElement('button');
      b.className = 'game-btn';
      b.textContent = label;
      b.dataset.i = i;
      optsEl.appendChild(b);
    });
    hud();
  }

  function onAnswer(i) {
    if (answered) return;
    answered = true;
    const item = QUESTIONS[qi];
    const btns = Array.from(optsEl.children);
    btns.forEach(b => b.style.pointerEvents = 'none');
    if (btns[item.correct]) btns[item.correct].classList.add('correct');
    if (i === item.correct) {
      streak++;
      score += 10 + (streak - 1) * 2;
      playBeep(660); setTimeout(() => playBeep(880), 120);
    } else {
      if (i >= 0 && btns[i]) btns[i].classList.add('incorrect');
      streak = 0;
      playBeep(180, 0.25, 'square');
    }
    hud();
    setTimeout(() => {
      qi++;
      if (qi < QUESTIONS.length) renderQ();
      else showResult();
    }, 1100);
  }

  function confetti() {
    const colors = ['#6C63FF', '#1DB88A', '#EF9F27', '#D4537E', '#D85A30', '#ffffff'];
    for (let i = 0; i < 80; i++) {
      const bit = document.createElement('span');
      bit.className = 'confetti-bit';
      bit.style.left = Math.random() * 100 + 'vw';
      bit.style.background = colors[Math.floor(Math.random() * colors.length)];
      bit.style.animationDuration = (Math.random() * 1.6 + 1.6) + 's';
      bit.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(bit);
      setTimeout(() => bit.remove(), 4200);
    }
  }

  function showResult() {
    playPanel.style.display = 'none';
    resultPanel.style.display = 'block';
    document.getElementById('quiz-final').textContent = score;
    const prev = Progress.get(CHAPTER_ID).bestScore || 0;
    const best = Math.max(prev, score);
    Progress.save(CHAPTER_ID, { bestScore: best });
    document.getElementById('quiz-best').textContent = score >= prev && prev > 0 ? `🏅 New personal best! (old best: ${prev})` : `Personal best: ${best}`;
    const v = document.getElementById('quiz-verdict');
    if (score >= 90) { v.textContent = '👑 SHAPE MASTER SUPREME!'; confetti(); }
    else if (score >= 60) { v.textContent = '⚔️ Shape Shifter defeated!'; confetti(); }
    else if (score >= 30) { v.textContent = '🛡️ Close one! Revisit the family tree and rematch.'; }
    else { v.textContent = '🌱 The Shape Shifter escaped — scroll back and train!'; }
  }

  document.getElementById('quiz-start').addEventListener('click', () => {
    startPanel.style.display = 'none';
    playPanel.style.display = 'block';
    qi = 0; score = 0; streak = 0;
    renderQ();
  });
  document.getElementById('quiz-retry').addEventListener('click', () => {
    resultPanel.style.display = 'none';
    playPanel.style.display = 'block';
    qi = 0; score = 0; streak = 0;
    renderQ();
  });
  optsEl.addEventListener('click', (e) => {
    const b = e.target.closest('.game-btn');
    if (b) onAnswer(Number(b.dataset.i));
  });
})();
</script>
