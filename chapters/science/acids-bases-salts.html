<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Acids, Bases & Salts — learn.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/global.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  /* ===== HEADER ===== */
  .chapter-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,7,15,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .chapter-header .row {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px;
  }
  .chapter-header .back {
    width: 34px; height: 34px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px; background: var(--surface); border: 1px solid var(--border);
  }
  .chapter-header h1 { font-size: 1rem; flex: 1; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.06); }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s ease; }

  /* ===== MAIN TOPIC VIEW ===== */
  .topic-view { display: none; position: fixed; top: var(--header-h, 60px); left: 0; right: 0; bottom: 0; }
  .topic-view.active { display: block; }

  .scene-container {
    height: 100%; position: relative; overflow: hidden;
    outline: none;
  }
  .scene {
    height: 100%; width: 100%; position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px 60px; text-align: center;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .scene .eyebrow { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent, var(--primary)); margin-bottom: 10px; font-weight: 600; }
  .scene h2 { font-size: clamp(1.4rem, 5vw, 2.1rem); margin-bottom: 12px; max-width: 600px; }
  .scene .explain { color: var(--text-secondary); max-width: 480px; font-size: 0.95rem; margin-bottom: 24px; }
  
  .flip-card { perspective: 800px; }
  .flip-inner { width: 100%; height: 100%; position: relative; transition: transform .6s; transform-style: preserve-3d; }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
  }
  .flip-back { transform: rotateY(180deg); padding: 6px; text-align: center; color: var(--text-secondary); }

  /* sour-sorting warm-up game */
  .sort-game { display: flex; align-items: center; gap: 24px; width: 100%; max-width: 580px; }
  .sort-items { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  .sort-item {
    aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; gap: 4px;
    transition: opacity .3s ease, transform .3s ease; cursor: pointer;
  }
  .sort-item span { font-size: 0.58rem; color: var(--text-secondary); }
  .sort-item.placed { opacity: 0; transform: scale(0.5); pointer-events: none; }
  .sort-item.wrong-shake { animation: itemShake .3s ease; }
  @keyframes itemShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  
  .sort-basket {
    display: flex; flex-direction: column; align-items: center; padding: 20px 30px;
    border: 2px dashed rgba(255,255,255,0.2); border-radius: 14px; transition: border-color .3s ease;
    flex-shrink: 0;
  }
  .sort-basket.full { border-color: var(--accent); }
  .basket-icon { font-size: 2.1rem; }
  .basket-label { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
  .basket-count { font-family: var(--font-head); margin-top: 4px; }
  
  .sort-reveal { display: none; }
  .sort-reveal.show { display: block; }

  /* properties-of-acids scene */
  .props-grid {
    display: flex; gap: 14px;
    width: 100%; max-width: 100%; overflow-x: auto;
    padding: 4px 20px 24px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
  }
  .prop-card { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 0 0 132px; scroll-snap-align: start; }
  .prop-illus {
    width: 100%; height: 96px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 2.2rem; position: relative; overflow: hidden;
  }
  .prop-tile { width: 100%; height: 64px; cursor: pointer; }
  .prop-tile .flip-front { font-size: 0.68rem; color: var(--text-muted); padding: 4px; }
  .prop-tile .flip-back { font-size: 0.68rem; font-weight: 600; padding: 4px; line-height: 1.25; }

  /* sour/bitter: face reacts as a drop lands on it */
  .sour-face .face-layer, .bitter-face .face-layer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
  .sour-face .face-normal, .bitter-face .face-normal { animation: sourFaceNormal 2.4s ease-in-out infinite; }
  .sour-face .face-react, .bitter-face .face-react { animation: sourFaceReact 2.4s ease-in-out infinite; }
  .sour-face .sour-drop, .bitter-face .sour-drop { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; animation: sourDropFall 2.4s ease-in infinite; }
  @keyframes sourDropFall { 0% { top: 6px; opacity: 1; } 22% { top: 26px; opacity: 1; } 30%,100% { opacity: 0; } }
  @keyframes sourFaceNormal { 0%,25% { opacity: 1; transform: scale(1); } 35%,82% { opacity: 0; } 94%,100% { opacity: 1; transform: scale(1); } }
  @keyframes sourFaceReact { 0%,25% { opacity: 0; transform: scale(.7) rotate(0deg); } 35% { opacity: 1; transform: scale(1.15) rotate(-6deg); } 50% { transform: scale(1.1) rotate(6deg); } 65% { transform: scale(1.15) rotate(-4deg); } 80% { opacity: 1; transform: scale(1.05) rotate(0deg); } 90%,100% { opacity: 0; transform: scale(.7); } }

  /* litmus lying flat — a drop lands on it and it turns red */
  .litmus-scene .litmus-lying { position: absolute; bottom: 14px; width: 46px; height: 10px; border-radius: 3px; background: #3a6fd8; animation: litmusTurnRed 2.4s ease-in-out infinite; }
  .litmus-scene .acid-drop { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; animation: dropOntoLitmus 2.4s ease-in infinite; }
  @keyframes dropOntoLitmus { 0% { top: 6px; opacity: 1; } 55% { top: 44px; opacity: 1; } 65%,100% { opacity: 0; } }
  @keyframes litmusTurnRed { 0%,60% { background: #3a6fd8; } 75%,100% { background: #d8453a; } }
  .litmus-scene .litmus-lying.to-blue { background: #d8453a; animation: litmusTurnBlue 2.4s ease-in-out infinite; }
  @keyframes litmusTurnBlue { 0%,60% { background: #d8453a; } 75%,100% { background: #3a6fd8; } }

  /* corrosion — a drop lands on metal and it slowly dissolves away */
  .corrode-scene .metal-obj { display: inline-block; animation: metalDissolve 2.6s ease-in-out infinite; }
  .corrode-scene .acid-drop { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; animation: dropOntoMetal 2.6s ease-in infinite; }
  @keyframes dropOntoMetal { 0% { top: 4px; opacity: 1; } 38% { top: 32px; opacity: 1; } 46%,100% { opacity: 0; } }
  @keyframes metalDissolve { 0%,40% { opacity: 1; transform: scale(1); filter: blur(0); } 70% { opacity: .35; transform: scale(.6); filter: blur(1px); } 85%,100% { opacity: 0; transform: scale(.3); } }

  /* soluble — water lying around, a drop falls in and dissolves */
  .water-scene .water-pool { position: absolute; bottom: 10px; left: 8px; right: 8px; height: 16px; border-radius: 50%; background: linear-gradient(180deg, rgba(58,111,216,0.55), rgba(58,111,216,0.25)); }
  .water-scene .acid-drop { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; animation: dropIntoWater 2.4s ease-in infinite; }
  .water-scene .ripple-ring { left: 50%; margin-left: -11px; animation-delay: 1.5s; }
  @keyframes dropIntoWater { 0% { top: 4px; opacity: 1; } 60% { top: 46px; opacity: 1; } 70%,100% { opacity: 0; } }

  .bubble { position: absolute; bottom: 8px; width: 6px; height: 6px; border-radius: 50%; animation: bubbleUp 1.6s ease-in infinite; }
  .bubble.b1 { left: 30%; animation-delay: 0s; }
  .bubble.b2 { left: 50%; animation-delay: .4s; }
  .bubble.b3 { left: 68%; animation-delay: .8s; }
  .bubble-acid { background: rgba(216,90,48,0.7); }
  .bubble-h2 { background: rgba(108,99,255,0.7); }
  .bubble-co2 { background: rgba(170,170,180,0.7); }
  @keyframes bubbleUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 25% { opacity: .9; } 100% { transform: translateY(-26px) scale(1); opacity: 0; } }

  .gauge-track { position: relative; width: 56px; height: 8px; border-radius: 6px; background: linear-gradient(90deg, var(--teal), var(--coral)); }
  .gauge-dot { position: absolute; top: -3px; width: 10px; height: 10px; border-radius: 50%; background: #fff; box-shadow: 0 0 4px rgba(0,0,0,0.4); animation: gaugeSlide 2.2s ease-in-out infinite; }
  @keyframes gaugeSlide { 0%,100% { left: 0; } 50% { left: calc(100% - 10px); } }

  .ripple-ring { position: absolute; bottom: 12px; width: 22px; height: 6px; border: 1px solid rgba(108,99,255,0.5); border-radius: 50%; animation: ripple 1.6s ease-out infinite; }
  @keyframes ripple { 0% { transform: scale(0.3); opacity: .7; } 100% { transform: scale(2); opacity: 0; } }

  .merge-illus { position: relative; }
  .merge-dot { position: absolute; top: 50%; width: 8px; height: 8px; border-radius: 50%; transform: translateY(-50%); }
  .merge-left { left: 8px; background: rgba(216,90,48,0.8); animation: mergeLeftMove 1.8s ease-in-out infinite; }
  .merge-right { right: 8px; background: rgba(58,111,216,0.8); animation: mergeRightMove 1.8s ease-in-out infinite; }
  .merge-center { font-size: 1.8rem; animation: centerPop 1.8s ease-in-out infinite; }
  @keyframes mergeLeftMove { 0% { opacity: 1; transform: translateY(-50%) translateX(0); } 60% { opacity: 1; transform: translateY(-50%) translateX(16px); } 100% { opacity: 0; transform: translateY(-50%) translateX(16px); } }
  @keyframes mergeRightMove { 0% { opacity: 1; transform: translateY(-50%) translateX(0); } 60% { opacity: 1; transform: translateY(-50%) translateX(-16px); } 100% { opacity: 0; transform: translateY(-50%) translateX(-16px); } }
  @keyframes centerPop { 0%,55% { opacity: 0; transform: scale(.5); } 75% { opacity: 1; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }

  /* types-of-acids scene */
  .types-wrap {
    width: 100%; max-width: 560px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
    padding: 4px 4px 24px;
  }
  .acid-types { display: flex; gap: 12px; }
  .acid-type-card {
    flex: 1; padding: 16px 14px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    text-align: left;
  }
  .acid-type-card.organic { border-left: 3px solid var(--teal); }
  .acid-type-card.mineral { border-left: 3px solid var(--coral); }
  .acid-type-card .icon { font-size: 1.5rem; margin-bottom: 6px; }
  .acid-type-card h3 { font-size: 0.92rem; margin-bottom: 4px; }
  .acid-type-card .src { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.3; }
  .acid-type-card .examples { display: flex; flex-direction: column; gap: 5px; }
  .acid-type-card .examples span { font-size: 0.68rem; color: var(--text-secondary); }

  .acid-diff { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .diff-row { display: grid; grid-template-columns: 0.8fr 1fr 1fr; }
  .diff-row + .diff-row { border-top: 1px solid var(--border); }
  .diff-row span { padding: 8px 6px; font-size: 0.65rem; text-align: center; display: flex; align-items: center; justify-content: center; }
  .diff-row .diff-label { background: var(--surface-2); color: var(--text-secondary); font-weight: 600; }
  .diff-row .diff-organic { color: var(--teal); }
  .diff-row .diff-mineral { color: var(--coral); }

  .acid-icon { display: inline-block; animation: acidIconPulse 2.4s ease-in-out infinite; }
  @keyframes acidIconPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

  /* bases: strong odour rising off the substance */
  .smell-wave { position: absolute; top: 14px; font-size: 0.85rem; color: var(--text-secondary); animation: bubbleUp 1.8s ease-in infinite; }
  .smell-wave.w1 { left: 28%; animation-delay: 0s; }
  .smell-wave.w2 { left: 62%; animation-delay: .6s; }

  /* bases: smooth & slippery slide */
  .slip-icon { display: inline-block; animation: slipSlide 1.6s ease-in-out infinite; }
  @keyframes slipSlide { 0%,100% { transform: translateX(-10px) rotate(-8deg); } 50% { transform: translateX(10px) rotate(8deg); } }

  /* mineral acids — roomier tile with a fuller list of uses */
  .mineral-grid .prop-card { flex: 0 0 200px; }
  .mineral-grid .prop-tile { height: 190px; }
  .mineral-grid .prop-tile .flip-back {
    align-items: flex-start; justify-content: flex-start; text-align: left;
    padding: 10px 12px; font-size: 0.62rem; line-height: 1.4;
    overflow-y: auto; display: block;
  }
  .mineral-grid .prop-tile .flip-back b { display: block; font-size: 0.72rem; margin-bottom: 5px; color: var(--accent, var(--primary)); }
</style>
</head>

<script src="../../assets/js/utils.js"></script>
<script>
const CHAPTER_ID = 'acids-bases-salts'; // This line is for testing replacement.

/* ============== TOPIC DATA ============== */

  {

      `<div class="eyebrow">Classification</div>

      `<div class="eyebrow">Organic Acids</div>

/* ============== HEADER HEIGHT SYNC ============== */
function syncHeaderHeight() {
  const h = document.querySelector('.chapter-header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}
syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);

/* ============== RENDER THE SINGLE TOPIC ============== */
const rootEl = document.getElementById('topics-root');
const topic = TOPICS[0];

const view = document.createElement('div');
view.className = 'topic-view active';
view.id = 'topic-' + topic.id;
view.style.setProperty('--accent', topic.color);

const container = document.createElement('div');
container.className = 'scene-container';
container.tabIndex = 0;
container.style.setProperty('--accent', topic.color);

topic.scenes.forEach(sceneHtml => {
  const scene = document.createElement('div');
  scene.className = 'scene';
  scene.style.setProperty('--accent', topic.color);
  scene.innerHTML = sceneHtml;
  container.appendChild(scene);
});

view.appendChild(container);
rootEl.appendChild(view);

const progressFill = document.getElementById('progress-fill');
const sceneNav = createSceneNavigator({
  container,
  onChange: (index, total) => {
    progressFill.style.width = `${((index + 1) / total) * 100}%`;
    Progress.save(CHAPTER_ID, { lastScene: index });
  }
});
progressFill.style.width = `${(1 / sceneNav.total) * 100}%`;

// shuffle sour-sorting items so the sour ones aren't all in the first row
const sortItemsEl = document.getElementById('sort-items');
if (sortItemsEl) {
  const items = Array.from(sortItemsEl.children);
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  items.forEach(item => sortItemsEl.appendChild(item));
}

/* ============== GAME/INTERACTIVITY LOGIC ============== */

// flip cards
document.addEventListener('click', (e) => {
  const card = e.target.closest('.flip-card');
  if (card) card.classList.toggle('flipped');
});

// sour-sorting warm-up game
let sortPlaced = 0;
document.addEventListener('click', (e) => {
  const item = e.target.closest('.sort-item');
  if (!item || item.classList.contains('placed')) return;

  if (item.dataset.sour === '1') {
    item.classList.add('placed');
    sortPlaced++;
    document.getElementById('basket-count').textContent = `${sortPlaced} / 4`;
    playBeep(500);

    if (sortPlaced === 4) {
      document.getElementById('sort-basket').classList.add('full');
      setTimeout(() => {
        document.getElementById('sort-items').style.display = 'none';
        document.getElementById('sort-reveal').classList.add('show');
      }, 500);
    }
  } else {
    item.classList.add('wrong-shake');
    playBeep(180, 0.2, 'square');
    setTimeout(() => item.classList.remove('wrong-shake'), 300);
  }
});
</script>
