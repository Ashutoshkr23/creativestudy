<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Delhi Sultans — learn.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/global.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  /* ===== HEADER ===== */
  .chapter-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,7,15,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .chapter-header .row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; }
  .chapter-header .back {
    width: 34px; height: 34px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px; background: var(--surface); border: 1px solid var(--border);
  }
  .chapter-header h1 { font-size: 1rem; flex: 1; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.06); }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s ease; }

  /* ===== SCENES ===== */
  .topic-view { display: none; position: fixed; top: var(--header-h, 60px); left: 0; right: 0; bottom: 0; }
  .topic-view.active { display: block; }
  .scene-container { height: 100%; position: relative; overflow: hidden; outline: none; }
  .scene {
    height: 100%; width: 100%; position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px 40px; text-align: center;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    overflow-y: auto; overflow-x: hidden;
  }
  .scene::before, .scene::after { content: ''; flex: 0 0 auto; margin: auto; }
  .scene .eyebrow { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent, var(--primary)); margin-bottom: 10px; font-weight: 600; }
  .scene h2 { font-size: clamp(1.35rem, 5vw, 2rem); margin-bottom: 10px; max-width: 640px; }
  .scene .explain { color: var(--text-secondary); max-width: 500px; font-size: 0.92rem; margin-bottom: 20px; }
  .scroll-hint { position: absolute; bottom: 14px; left: 0; right: 0; font-size: 0.72rem; color: var(--text-muted); animation: hintBob 1.8s ease-in-out infinite; }
  @keyframes hintBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

  .flip-card { perspective: 800px; }
  .flip-inner { width: 100%; height: 100%; position: relative; transition: transform .6s; transform-style: preserve-3d; }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
  }
  .flip-back { transform: rotateY(180deg); padding: 8px; text-align: center; color: var(--text-secondary); }

  .game-btn {
    padding: 11px 20px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 600; font-size: 0.88rem;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .game-btn:hover { border-color: var(--accent, var(--primary)); transform: translateY(-2px); }
  .game-btn.primary { background: var(--accent, var(--primary)); border-color: transparent; color: #fff; }
  .game-btn:disabled { opacity: 0.35; pointer-events: none; }
  .wrong-shake { animation: itemShake .3s ease; }
  @keyframes itemShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .msg-line { min-height: 22px; font-size: 0.85rem; color: var(--text-secondary); margin-top: 12px; }
  .msg-line.good { color: var(--teal); font-weight: 600; }
  .msg-line.bad { color: var(--coral); font-weight: 600; }

  /* ===== 1. DYNASTY TOWER ===== */
  .tower-zone { display: flex; gap: 22px; align-items: flex-end; justify-content: center; width: 100%; max-width: 520px; margin-bottom: 14px; }
  .tower-stack { display: flex; flex-direction: column-reverse; gap: 5px; min-height: 230px; justify-content: flex-start; flex: 1; max-width: 250px; }
  .tower-block {
    padding: 10px 8px; border-radius: 8px; font-family: var(--font-head); font-weight: 700; font-size: 0.78rem;
    color: #fff; animation: popIn .4s ease;
  }
  .tower-block small { display: block; font-weight: 400; font-size: 0.62rem; opacity: 0.85; }
  .tower-base { border-top: 4px solid var(--surface-2); padding-top: 6px; font-size: 0.65rem; color: var(--text-muted); }
  .dyn-pool { display: flex; flex-direction: column; gap: 8px; flex: 1; max-width: 210px; }
  .dyn-card {
    padding: 10px 8px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 600; font-size: 0.78rem;
    transition: opacity .3s ease, transform .3s ease;
  }
  .dyn-card.used { opacity: 0; transform: scale(0.5); pointer-events: none; }
  .tower-win { display: none; font-size: 0.85rem; color: var(--teal); font-weight: 600; margin-top: 8px; }
  .tower-win.show { display: block; animation: popIn .5s ease; }

  /* ===== story / concept cards ===== */
  .concept-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .concept-cards .flip-card { width: 150px; height: 140px; cursor: pointer; }
  .concept-cards .flip-front { font-size: 0.85rem; font-weight: 600; gap: 8px; padding: 8px; }
  .concept-cards .flip-front .ic { font-size: 1.7rem; }
  .concept-cards .flip-back { font-size: 0.7rem; line-height: 1.45; padding: 10px; }
  .concept-cards .flip-back b { color: var(--accent, var(--primary)); }

  /* ===== 3. SOURCES MATCH ===== */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 520px; }
  .match-col { display: flex; flex-direction: column; gap: 10px; }
  .match-item {
    padding: 12px 10px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    font-size: 0.76rem; transition: border-color .2s ease, background .2s ease, opacity .3s ease; line-height: 1.4;
  }
  .match-item .big { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .match-item.selected { border-color: var(--accent, var(--primary)); background: rgba(216,90,48,0.12); }
  .match-item.done { opacity: 0.35; border-color: var(--teal); pointer-events: none; }

  /* ===== 4. RAZIYYA STORY ===== */
  .story-panel { width: 100%; max-width: 470px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }
  .story-panel .line { display: none; padding: 9px 0; font-size: 0.88rem; line-height: 1.55; color: var(--text-secondary); text-align: left; border-bottom: 1px dashed rgba(255,255,255,0.07); }
  .story-panel .line b { color: var(--text); }
  .story-panel .line.shown { display: block; animation: slideIn .4s ease; }
  .story-panel .line .who { font-family: var(--font-head); color: var(--accent, var(--primary)); font-weight: 700; }
  @keyframes slideIn { 0% { transform: translateY(12px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

  /* ===== 6. CIRCLE OF JUSTICE ===== */
  .circle-stage { position: relative; width: 300px; height: 300px; margin-bottom: 8px; flex-shrink: 0; }
  .circle-node {
    position: absolute; width: 86px; height: 86px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 0.6rem; color: var(--text-secondary); gap: 2px;
    transition: border-color .3s ease, box-shadow .3s ease, transform .3s ease;
  }
  .circle-node .ic { font-size: 1.35rem; }
  .circle-node.lit { border-color: var(--accent, var(--teal)); box-shadow: 0 0 18px rgba(29,184,138,0.4); transform: scale(1.08); color: var(--text); }
  .circle-caption { min-height: 44px; max-width: 420px; font-size: 0.85rem; color: var(--text-secondary); }
  .circle-caption b { color: var(--accent, var(--teal)); }

  /* ===== 7. IQTA FLOW ===== */
  .steps-panel { width: 100%; max-width: 470px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .steps-panel .step-line {
    display: none; align-items: center; gap: 12px;
    padding: 10px 12px; margin-bottom: 8px; border-radius: var(--radius-sm);
    background: var(--surface-2); border: 1px solid var(--border); text-align: left;
  }
  .steps-panel .step-line.shown { display: flex; animation: slideIn .4s ease; }
  .steps-panel .step-line .ic { font-size: 1.4rem; flex-shrink: 0; }
  .steps-panel .step-line .words { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.45; }
  .steps-panel .step-line .words b { color: var(--accent, var(--teal)); }

  /* ===== 8. FRONTIER SORT ===== */
  .sort2-bins { display: flex; gap: 12px; width: 100%; max-width: 480px; margin-bottom: 14px; }
  .sort2-bin {
    flex: 1; padding: 10px; border: 2px dashed rgba(255,255,255,0.18); border-radius: 12px;
    font-size: 0.72rem; color: var(--text-secondary); transition: border-color .3s ease;
  }
  .sort2-bin .cnt { font-family: var(--font-head); font-weight: 700; font-size: 0.85rem; color: var(--text); }
  .sort2-bin.done { border-color: var(--accent); }
  .sort2-card {
    width: 100%; max-width: 420px; padding: 16px 14px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border); font-size: 0.88rem; line-height: 1.5;
    margin-bottom: 14px; min-height: 74px; display: flex; align-items: center; justify-content: center;
  }
  .sort2-btns { display: flex; gap: 10px; }

  /* ===== 9-10. SULTAN SIMULATOR ===== */
  .sim-panel { width: 100%; max-width: 470px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
  .sim-story { font-size: 0.9rem; line-height: 1.6; color: var(--text-secondary); text-align: left; margin-bottom: 16px; }
  .sim-story b { color: var(--text); }
  .sim-choices { display: flex; flex-direction: column; gap: 9px; }
  .sim-choices .game-btn { text-align: left; font-size: 0.82rem; line-height: 1.4; }
  .sim-result { display: none; text-align: left; }
  .sim-result.show { display: block; animation: popIn .4s ease; }
  .sim-result .you-chose { font-size: 0.78rem; color: var(--accent, var(--amber)); font-family: var(--font-head); font-weight: 700; margin-bottom: 8px; }
  .sim-result .outcome { font-size: 0.85rem; line-height: 1.6; color: var(--text-secondary); }
  .sim-result .outcome b { color: var(--text); }
  .sim-result .history-box {
    margin-top: 12px; padding: 12px; border-radius: var(--radius-sm);
    background: rgba(239,159,39,0.08); border: 1px solid rgba(239,159,39,0.3);
    font-size: 0.8rem; line-height: 1.55; color: var(--text-secondary);
  }
  .sim-result .history-box b { color: var(--amber); }

  /* ===== quiz ===== */
  .quiz-box { width: 100%; max-width: 440px; }
  .quiz-hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-family: var(--font-head); font-size: 0.85rem; }
  .quiz-hud .streak { color: var(--amber); }
  .quiz-q { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; min-height: 58px; margin-bottom: 14px; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .quiz-opts .game-btn { font-size: 0.82rem; }
  .quiz-opts .game-btn.correct { background: var(--teal); border-color: transparent; color: #fff; }
  .quiz-opts .game-btn.incorrect { background: var(--coral); border-color: transparent; color: #fff; }
  .quiz-start-panel, .quiz-result-panel { text-align: center; }
  .quiz-result-panel { display: none; }
  .quiz-result-panel .final-score { font-family: var(--font-head); font-size: 3rem; color: var(--accent, var(--pink)); }
  .quiz-result-panel .best { font-size: 0.85rem; color: var(--text-secondary); margin: 8px 0 18px; }
  .confetti-bit { position: fixed; top: -12px; width: 8px; height: 14px; z-index: 200; animation: confettiFall linear forwards; pointer-events: none; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0.6; } }

  /* ===== finish ===== */
  .recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 460px; margin-bottom: 22px; }
  .recap-card { padding: 16px 12px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); text-align: left; }
  .recap-card .ic { font-size: 1.4rem; margin-bottom: 8px; }
  .recap-card h4 { font-size: 0.82rem; margin-bottom: 5px; }
  .recap-card p { font-size: 0.68rem; color: var(--text-secondary); line-height: 1.45; }

  @media (max-width: 480px) {
    .tower-zone { gap: 12px; }
    .circle-stage { transform: scale(0.88); margin: -12px 0; }
  }
</style>
</head>
<body>

<header class="chapter-header">
  <div class="row">
    <a href="../history.html" class="back">←</a>
    <h1>The Delhi Sultans</h1>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</header>

<div id="topics-root"></div>

<script src="../../assets/js/utils.js"></script>
<script>
const CHAPTER_ID = 'delhi-sultans';

/* ============== TOPIC DATA ============== */
const TOPICS = [
  {
    id: 'delhi-rises', title: 'Delhi Becomes a Capital', color: '#D85A30',
    scenes: [
      `<div class="eyebrow">🏗️ Warm-up Game</div>
       <h2>Build the Sultanate tower!</h2>
       <p class="explain">Five dynasties ruled Delhi from 1206 to 1526 — but time has shuffled them! Tap them in the correct order, <b style="color:var(--text)">earliest first</b>, to stack the tower.</p>
       <div class="tower-zone">
         <div style="flex:1; max-width:250px;">
           <div class="tower-stack" id="tower-stack"></div>
           <div class="tower-base">DELHI · 1206 CE</div>
         </div>
         <div class="dyn-pool" id="dyn-pool"></div>
       </div>
       <div class="tower-win" id="tower-win">🏰 320 years of Sultans, stacked in order!</div>
       <div class="msg-line" id="tower-msg"></div>
       <div class="scroll-hint">▼ scroll to continue</div>`,
      `<div class="eyebrow">🏛️ Before the Sultans</div>
       <h2>Who ruled Delhi first?</h2>
       <p class="explain">Delhi wasn't always a capital of empires. Tap the cards to travel back before 1206.</p>
       <div class="concept-cards">
         <div class="flip-card"><div class="flip-inner">
           <div class="flip-front"><span class="ic">🛡️</span>The Tomaras</div>
           <div class="flip-back">Rajput kings who <b>founded Delhi</b> as a city and first made it a capital, around the 12th century.</div>
         </div></div>
         <div class="flip-card"><div class="flip-inner">
           <div class="flip-front"><span class="ic">⚔️</span>The Chauhans</div>
           <div class="flip-back">Rajputs of Ajmer (famous king: <b>Prithviraj Chauhan</b>) who defeated the Tomaras and took Delhi.</div>
         </div></div>
         <div class="flip-card"><div class="flip-inner">
           <div class="flip-front"><span class="ic">🪙</span>Dehliwal coins</div>
           <div class="flip-back">Under the Rajputs, Delhi became a busy trade centre — its <b>coins</b> were called dehliwal and used far and wide.</div>
         </div></div>
         <div class="flip-card"><div class="flip-inner">
           <div class="flip-front"><span class="ic">👑</span>1206 CE</div>
           <div class="flip-back"><b>Qutbuddin Aybak</b> became the first Sultan of Delhi — the Delhi Sultanate begins, and Delhi becomes a capital that controls vast parts of the subcontinent.</div>
         </div></div>
       </div>`,
      `<div class="eyebrow">🕵️ History Detective</div>
       <h2>How do we even KNOW all this?</h2>
       <p class="explain">Historians are detectives — every fact needs evidence. Tap a source, then tap what it reveals. Match all 4!</p>
       <div class="match-grid">
         <div class="match-col" id="src-col">
           <button class="match-item" data-pair="a"><span class="big">📜</span><b>Tawarikh</b> — histories written in Persian by court scholars</button>
           <button class="match-item" data-pair="b"><span class="big">🪙</span><b>Coins</b> dug up by archaeologists</button>
           <button class="match-item" data-pair="c"><span class="big">🕌</span><b>Buildings</b> like the Qutb Minar</button>
           <button class="match-item" data-pair="d"><span class="big">🪨</span><b>Inscriptions</b> carved on stone</button>
         </div>
         <div class="match-col" id="clue-col">
           <button class="match-item" data-pair="c">Show the Sultan's wealth, power and the engineering skill of the time</button>
           <button class="match-item" data-pair="a">Tell us about rulers and court events — but the authors wrote hoping for <b>rewards</b>, so they praised the Sultan!</button>
           <button class="match-item" data-pair="d">Record names, dates and orders exactly as carved — hard evidence in stone</button>
           <button class="match-item" data-pair="b">Reveal a ruler's name, the year, and even how rich the kingdom was (gold or cheap metal?)</button>
         </div>
       </div>
       <div class="msg-line" id="src-msg"></div>`
    ]
  },
  {
    id: 'rulers', title: 'The Famous Rulers', color: '#6C63FF',
    scenes: [
      `<div class="eyebrow">👸 True Story</div>
       <h2>Raziyya — the only Sultan who was a woman</h2>
       <p class="explain">Tap "Next" to unfold one of the most remarkable stories of the Sultanate.</p>
       <div class="story-panel" id="raziyya-panel">
         <div class="line shown"><span class="who">1236 CE.</span> Sultan Iltutmish dies. By tradition a son should take the throne… but Iltutmish had wanted someone else — his <b>daughter, Raziyya</b>.</div>
         <div class="line">The chronicler <b>Minhaj-i Siraj</b> himself admitted: Raziyya was <b>more able and qualified than all her brothers</b>.</div>
         <div class="line">She dropped the title "Sultana" (wife of a Sultan) and ruled as <b>SULTAN</b> — commanding armies, holding court, issuing coins.</div>
         <div class="line">But Minhaj wrote that a queen's rule went <b>against the ideal social order</b> — in his view, "the just should rule, and women should not." The powerful nobles agreed…</div>
         <div class="line">In <b>1240 CE</b>, after just four years, the nobles removed her from the throne. She wasn't overthrown for ruling badly — she was removed for <b>being a woman</b>.</div>
         <div class="line">🧠 <b>Detective lesson:</b> chroniclers had opinions! When you read old histories, always ask — <b>who wrote this, and what did THEY believe?</b></div>
       </div>
       <button class="game-btn primary" id="raziyya-next">Next →</button>`,
      `<div class="eyebrow">🎮 Match Game</div>
       <h2>Sultan… meet your claim to fame</h2>
       <p class="explain">Tap a ruler, then tap the deed history remembers them for.</p>
       <div class="match-grid">
         <div class="match-col" id="ruler-col">
           <button class="match-item" data-pair="a"><span class="big">👑</span><b>Qutbuddin Aybak</b> (1206)</button>
           <button class="match-item" data-pair="b"><span class="big">👸</span><b>Raziyya</b> (1236–1240)</button>
           <button class="match-item" data-pair="c"><span class="big">🛒</span><b>Alauddin Khalji</b> (1296–1316)</button>
           <button class="match-item" data-pair="d"><span class="big">🎲</span><b>Muhammad Tughlaq</b> (1324–1351)</button>
           <button class="match-item" data-pair="e"><span class="big">⚰️</span><b>Ibrahim Lodi</b> (till 1526)</button>
         </div>
         <div class="match-col" id="deed-col">
           <button class="match-item" data-pair="c">Fixed market prices in Delhi so soldiers could afford food, and beat back fierce <b>Mongol attacks</b></button>
           <button class="match-item" data-pair="e">The LAST Sultan — defeated by <b>Babur at Panipat (1526)</b>, which began the Mughal Empire</button>
           <button class="match-item" data-pair="a">First Sultan of Delhi; began building the <b>Qutb Minar</b> (Iltutmish completed it)</button>
           <button class="match-item" data-pair="d">The Sultan of wild experiments — <b>shifted the capital</b> and invented <b>token money</b></button>
           <button class="match-item" data-pair="b">Ruled as Sultan in her own right — the <b>only woman</b> ever on Delhi's throne</button>
         </div>
       </div>
       <div class="msg-line" id="ruler-msg"></div>`
    ]
  },
  {
    id: 'running', title: 'Running the Sultanate', color: '#1DB88A',
    scenes: [
      `<div class="eyebrow">⚖️ Big Idea</div>
       <h2>The Circle of Justice</h2>
       <p class="explain">Court poets explained why even a mighty Sultan needs happy peasants. Tap "Follow the circle" and watch the chain.</p>
       <div class="circle-stage" id="justice-circle">
         <div class="circle-node" style="top:0; left:107px;"><span class="ic">👑</span>SULTAN</div>
         <div class="circle-node" style="top:72px; right:0;"><span class="ic">⚔️</span>SOLDIERS</div>
         <div class="circle-node" style="bottom:0; right:52px;"><span class="ic">💰</span>SALARIES</div>
         <div class="circle-node" style="bottom:0; left:52px;"><span class="ic">🌾</span>TAXES</div>
         <div class="circle-node" style="top:72px; left:0;"><span class="ic">👨‍🌾</span>PEASANTS</div>
       </div>
       <div class="circle-caption" id="justice-caption">Every king depends on someone below him…</div>
       <button class="game-btn primary" id="justice-btn" style="margin-top:10px;">Follow the circle →</button>`,
      `<div class="eyebrow">🗺️ Administration</div>
       <h2>Iqta — how the Sultan paid his generals</h2>
       <p class="explain">No bank transfers in 1300! Tap through to see the clever (and risky) salary system.</p>

/* generic tap-to-pair matcher */
function makeMatcher(leftColId, rightColId, msgId, winText) {
  const msg = document.getElementById(msgId);
  const leftCol = document.getElementById(leftColId);
  const rightCol = document.getElementById(rightColId);
  const total = leftCol.children.length;
  let selected = null, matched = 0;

  [leftCol, rightCol].forEach(col => col.addEventListener('click', (e) => {
    const item = e.target.closest('.match-item');
    if (!item || item.classList.contains('done')) return;
    const isLeft = item.parentElement === leftCol;
    if (isLeft) {
      leftCol.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      selected = item;
      return;
    }
    if (!selected) {
      msg.textContent = 'First pick one from the left column!';
      msg.className = 'msg-line';
      return;
    }
    if (item.dataset.pair === selected.dataset.pair) {
      item.classList.add('done');
      selected.classList.add('done');
      selected.classList.remove('selected');
      selected = null;
      matched++;
      playBeep(600 + matched * 80);
      msg.textContent = matched === total ? winText : `Matched ${matched} / ${total}!`;
      msg.className = 'msg-line good';
    } else {
      item.classList.add('wrong-shake');
      playBeep(180, 0.2, 'square');
      setTimeout(() => item.classList.remove('wrong-shake'), 300);
      msg.textContent = 'Not that one — think again! 🤔';
      msg.className = 'msg-line bad';
    }
  }));
}

    for (let i = 0; i < 80; i++) {
      const bit = document.createElement('span');
      bit.className = 'confetti-bit';
      bit.style.left = Math.random() * 100 + 'vw';
      bit.style.background = colors[Math.floor(Math.random() * colors.length)];
      bit.style.animationDuration = (Math.random() * 1.6 + 1.6) + 's';
      bit.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(bit);
      setTimeout(() => bit.remove(), 4200);
    }
  }

  function showResult() {
    playPanel.style.display = 'none';
    resultPanel.style.display = 'block';
    document.getElementById('quiz-final').textContent = score;
    const prev = Progress.get(CHAPTER_ID).bestScore || 0;
    const best = Math.max(prev, score);
    Progress.save(CHAPTER_ID, { bestScore: best });
    document.getElementById('quiz-best').textContent = score >= prev && prev > 0 ? `🏅 New personal best! (old best: ${prev})` : `Personal best: ${best}`;
    const v = document.getElementById('quiz-verdict');
    if (score >= 90) { v.textContent = '👑 COURT HISTORIAN SUPREME!'; confetti(); }
    else if (score >= 60) { v.textContent = '📜 The Sultan grants you a robe of honour!'; confetti(); }
    else if (score >= 30) { v.textContent = '🛡️ The court murmurs… revisit the scrolls and return.'; }
    else { v.textContent = '🌱 Banished from court! Scroll back up and study the Sultans.'; }
  }

  document.getElementById('quiz-start').addEventListener('click', () => {
    startPanel.style.display = 'none';
    playPanel.style.display = 'block';
    qi = 0; score = 0; streak = 0;
    renderQ();
  });
  document.getElementById('quiz-retry').addEventListener('click', () => {
    resultPanel.style.display = 'none';
    playPanel.style.display = 'block';
    qi = 0; score = 0; streak = 0;
    renderQ();
  });
  optsEl.addEventListener('click', (e) => {
    const b = e.target.closest('.game-btn');
    if (b) onAnswer(Number(b.dataset.i));
  });
})();
</script>
</body>
</html>
